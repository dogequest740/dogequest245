name: Deploy Supabase Edge Functions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/game-secure/**"
      - "supabase/functions/dungeon-secure/**"
      - ".github/workflows/deploy-supabase-functions.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_REF: ybnheuyaddwtqevelsck
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN repository secret"
            exit 1
          fi

      - name: Deploy game-secure and dungeon-secure
        shell: bash
        run: |
          set -euo pipefail

          retry() {
            local tries="$1"
            shift
            local cmd="$*"
            local n=1
            until [ "$n" -gt "$tries" ]; do
              echo "Attempt $n/$tries: $cmd"
              if eval "$cmd"; then
                return 0
              fi
              n=$((n + 1))
              sleep 5
            done
            return 1
          }

          retry 5 "supabase functions deploy game-secure --project-ref $PROJECT_REF --no-verify-jwt --use-api"
          retry 5 "supabase functions deploy dungeon-secure --project-ref $PROJECT_REF --use-api"
